name: pra_nikah_app
description: "Aplikasi Persiapan Nikah - Wedding Preparation Planner"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  http: ^1.2.2
  package_info_plus: ^8.1.3
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "web/icons/Icon-512.png"
  adaptive_icon_background: "#FCE4EC"
  adaptive_icon_foreground: "web/icons/Icon-512.png"
